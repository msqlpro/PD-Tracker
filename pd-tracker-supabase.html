// ── AI Meal Analysis ──
async function analyzeMealWithAI(description) {
  try {
    var response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST", headers: { "Content-Type": "application/json", "x-api-key": ANTHROPIC_API_KEY, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
      body: JSON.stringify({
        model: "claude-sonnet-4-5-20250929", max_tokens: 1000,
        messages: [{ role: "user", content: 'You are a precise UK nutritionist. Analyze this meal and return ONLY valid JSON (no markdown, no backticks).\nMeal: "' + description + '"\nReturn: {"foods":[{"food":"name","emoji":"emoji","per":"portion","multiplier":1,"protein":0,"carbs":0,"fibre":0,"calories":0,"sugar":0}],"totals":{"protein":0,"carbs":0,"fibre":0,"calories":0,"sugar":0}}\nRules:\n- All values in grams (integers) except calories which are kcal\n- UK English spelling\n- Calculate for exact stated quantities\n- Use real nutritional data. Examples per 100g/100ml:\n  Egg ~6g protein, ~78kcal each. Chicken breast ~31g protein, ~165kcal/100g. Salmon ~20g protein, ~208kcal/100g.\n  Dairy kefir ~3g protein, ~60kcal/100ml. Coconut kefir ~1g protein, ~20kcal/100ml.\n  Almonds ~21g protein, ~579kcal/100g. Walnuts ~15g protein, ~654kcal/100g. Oats ~11g protein, ~389kcal/100g.\n  Most fruits and vegetables are 0-3g protein/100g.\n- Never round small values down to 0 — if a food has 1-2g protein, report 1 or 2, not 0\n- Use appropriate emoji per food item' }]
      })
    });
    var data = await response.json();
    var text = (data.content || []).map(function(b) { return b.text || ""; }).join("");
    return JSON.parse(text.replace(/```json\s*/g, "").replace(/```\s*/g, "").trim());
  } catch (e) { return null; }
}

// ── AI Report ──
async function generateReport(period, data) {
  try {

    if (data.logs.length) {
      summary += "MEDICATION DOSES (" + data.logs.length + "):\n";
      data.logs.forEach(function(l) { summary += "- " + l.medName + " " + (l.dose || "") + " at " + (l.takenAt || "").slice(11, 16) + " eff:" + (l.effectiveness || "unrated") + "/5\n"; });
    }
    if (data.meals.length) {
      summary += "\nMEALS (" + data.meals.length + "):\n";

    }
    if (data.ex.length) {
      summary += "\nEXERCISE (" + data.ex.length + "):\n";
      data.ex.forEach(function(e) { summary += "- " + (e.loggedAt || "").slice(0, 16) + " " + e.type + " " + e.duration + "min " + e.intensity + "\n"; });
    }
    if (data.slp.length) {

      data.slp.forEach(function(s) { summary += "- " + s.date + " " + s.hours + "h quality:" + s.quality + "/5 " + s.bedtime + "->" + s.wakeTime + "\n"; });
    }
    if (data.sym.length) {
      summary += "\nSYMPTOMS (" + data.sym.length + "):\n";
      data.sym.forEach(function(s) { summary += "- " + (s.loggedAt || "").slice(0, 16) + " " + s.symptomId + " sev:" + s.severity + "/5" + (s.notes ? " (" + s.notes + ")" : "") + "\n"; });

    if (data.oo.length) {
      summary += "\nON/OFF STATES (" + data.oo.length + "):\n";

    if (data.fast && data.fast.length) {

    }
    if (data.drinks && data.drinks.length) {
      summary += "\nDRINKS (" + data.drinks.length + "):\n";
      data.drinks.forEach(function(d) { summary += "- " + (d.loggedAt || "").slice(0, 16) + " " + d.name + " " + d.volume + "ml" + (d.caffeine ? " caff:" + d.caffeine + "mg" : "") + (d.calories ? " " + d.calories + "kcal" : "") + "\n"; });
    }
    if (data.weight && data.weight.length) {
      var ws = data.weight.slice().sort(function(a, b) { return (a.date || "").localeCompare(b.date || ""); });
      summary += "\nWEIGHT (" + ws.length + " entries):\n";
      ws.forEach(function(w, i) {
        var diff = i > 0 ? (w.weight - ws[i - 1].weight).toFixed(1) : null;
        summary += "- " + w.date + " " + w.weight + "kg" + (diff !== null ? " (" + (parseFloat(diff) > 0 ? "+" : "") + diff + "kg)" : "") + (w.note ? " (" + w.note + ")" : "") + "\n";
      });
      if (ws.length > 1) { var total = (ws[ws.length - 1].weight - ws[0].weight).toFixed(1); summary += "Net change: " + (parseFloat(total) > 0 ? "+" : "") + total + "kg over " + ws.length + " weigh-ins\n"; }

    if (data.mood && data.mood.length) {

      body: JSON.stringify({
        model: "claude-sonnet-4-5-20250929", max_tokens: 2000,
        messages: [{ role: "user", content: summary + "\n\nYou are a Parkinson's disease tracking analyst. Provide a clear, insightful " + period + " report covering:\n1. **Medication Patterns** — timing consistency, effectiveness trends, any missed doses\n2. **Protein-Medication Interaction** — ONLY flag as a concern if a HIGH-protein meal (30g+) was eaten within 30 minutes BEFORE a dose. A dose taken 1-2 hours AFTER eating is normal and acceptable for non-first doses during the eating window. Do NOT flag doses that already have 4/5 or 5/5 effectiveness. The first dose at 7am on an empty stomach is optimal.\n3. **Symptom Trends** — most frequent/severe symptoms, any time-of-day patterns\n4. **ON/OFF Analysis** — ratio, duration patterns, correlation with medication timing\n5. **Sleep Impact** — quality trends, correlation with next-day symptoms\n6. **Exercise Benefits** — correlation with symptom severity and ON time\n7. **Nutrition Overview** — daily protein/fibre/calorie averages, fasting compliance\n8. **Fasting Compliance** — adherence to 14h intermittent fasting target, average fasting duration, consistency\n9. **Weight Trends** — weight change over the period, rate of loss/gain, correlation with exercise and nutrition\n10. **Mood Patterns** — average mood, trends, correlation with sleep/exercise/medication effectiveness\n11. **Gut Health & Bowel** — Bristol stool scale patterns, frequency, correlation with diet/fibre/hydration (very relevant for PD)\n12. **Key Recommendations** — 3-5 specific, actionable suggestions\n\nCRITICAL RULES:\n- Levodopa is best absorbed on an EMPTY stomach. Do NOT recommend eating before or with medication.\n- The patient takes 3 daily doses: ~7am (fasted, optimal), ~12pm, ~5pm. The 12pm and 5pm doses will inevitably overlap with the 10:30am-8:30pm eating window — this is NORMAL and expected.\n- Do NOT suggest moving doses to impractical times. Do NOT label good effectiveness (4-5/5) as compromised.\n- Only flag ACTUAL problems supported by the data (e.g. low effectiveness scores correlating with meal timing).\n- Never suggest taking medication CLOSER to a meal as a fix.\n- Be encouraging about what's working well. Be proportionate — don't label minor observations as 'critical'.\nBe concise but specific. Use the actual data. Skip sections with no data. Use emoji for readability. Format with markdown headers and bullet points." }]
      })
    });
    var result = await response.json();
    return (result.content || []).map(function(b) { return b.text || ""; }).join("");
  } catch (e) { return "Report generation failed. Please try again."; }
}

// ── Supabase Storage Layer ──
var TBL = { meds: "medications", logs: "med_logs", meals: "meals", ex: "exercise", sleep: "sleep", sym: "symptoms", onoff: "on_off_state", fast: "fasting", drinks: "drinks", weight: "weight", mood: "mood", bowel: "bowel", activity: "activity" };
var TO_ROW = {
  meds: function(d) { return { id: d.id, user_id: CURRENT_UID, name: d.name, dose: d.dose || "", times: d.times || [] }; },
  logs: function(d) { return { id: d.id, user_id: CURRENT_UID, med_id: d.medId, med_name: d.medName, dose: d.dose || "", taken_at: d.takenAt, effectiveness: d.effectiveness || 0 }; },

  drinks: function(d) { return { id: d.id, user_id: CURRENT_UID, drink_id: d.drinkId, name: d.name, emoji: d.emoji || "🥤", volume: d.volume || 0, caffeine: d.caffeine || 0, calories: d.calories || 0, note: d.note || "", logged_at: d.loggedAt }; },
  weight: function(d) { return { id: d.id, user_id: CURRENT_UID, weight: d.weight, unit: d.unit || "kg", note: d.note || "", date: d.date }; },
  mood: function(d) { return { id: d.id, user_id: CURRENT_UID, level: d.level, note: d.note || "", date: d.date }; },
  bowel: function(d) { return { id: d.id, user_id: CURRENT_UID, strain: d.strain || false, note: d.note || "", logged_at: d.loggedAt }; },
  activity: function(d) { return { id: d.id, user_id: CURRENT_UID, type: d.type, duration: d.duration, note: d.note || "", logged_at: d.loggedAt }; }
};
var FROM_ROW = {
  meds: function(r) { return { id: r.id, name: r.name, dose: r.dose, times: r.times || [] }; },
  logs: function(r) { return { id: r.id, medId: r.med_id, medName: r.med_name, dose: r.dose, takenAt: r.taken_at, effectiveness: r.effectiveness || 0 }; },

  weight: function(r) { return { id: r.id, weight: Number(r.weight), unit: r.unit, note: r.note, date: r.date }; },
  mood: function(r) { return { id: r.id, level: r.level, note: r.note, date: r.date }; },

};
async function dbLoad(key) { var t = TBL[key]; if (!t) return []; var { data, error } = await sb.from(t).select("*").eq("user_id", CURRENT_UID); if (error) { console.error("Load " + key, error); return []; } return (data || []).map(FROM_ROW[key]); }
async function dbSave(key, item) { var t = TBL[key]; if (!t) return; var row = TO_ROW[key](item); var { error } = await sb.from(t).upsert(row); if (error) console.error("Save " + key, error); }
async function dbDel(key, id) { var t = TBL[key]; if (!t) return; var { error } = await sb.from(t).delete().eq("id", id); if (error) console.error("Del " + key, error); }
var K = { meds: "meds", logs: "logs", meals: "meals", ex: "ex", sleep: "sleep", sym: "sym", onoff: "onoff", cex: "cex", fast: "fast", drinks: "drinks", waterTarget: "waterTarget", weight: "weight", mood: "mood", bowel: "bowel", darkMode: "darkMode", activity: "activity", cact: "cact", calTarget: "calTarget", protTarget: "protTarget", medTarget: "medTarget" };
function canStore() { return true; }
async function ld(k, fb) {
  // Profile settings come from Supabase profiles table
  if (k === K.waterTarget || k === K.calTarget || k === K.protTarget || k === K.medTarget || k === K.darkMode) {
    try {
      var { data } = await sb.from("profiles").select("settings").eq("id", CURRENT_UID).single();
      if (data && data.settings) {
        var s = data.settings;
        if (k === K.waterTarget) return s.waterTarget || fb;
        if (k === K.calTarget) return s.calTarget || fb;
        if (k === K.protTarget) return s.protTarget || fb;
        if (k === K.medTarget) return s.medTarget || fb;
        if (k === K.darkMode) return s.darkMode || fb;
      }
    } catch(e) {}
    return fb;
  }
  // Custom exercise/activity types stored in localStorage as they're minor
  if (k === K.cex || k === K.cact) { try { var v = localStorage.getItem("pd_" + k); return v ? JSON.parse(v) : fb; } catch(e) { return fb; } }
  // All data tables load from Supabase
  if (TBL[k]) return await dbLoad(k);
  return fb;
}
async function sv(k, v) {
  // Profile settings
  if (k === K.waterTarget || k === K.calTarget || k === K.protTarget || k === K.medTarget || k === K.darkMode) {
    try {
      var { data: existing } = await sb.from("profiles").select("settings").eq("id", CURRENT_UID).single();
      var settings = (existing && existing.settings) || {};
      if (k === K.waterTarget) settings.waterTarget = v;
      else if (k === K.calTarget) settings.calTarget = v;
      else if (k === K.protTarget) settings.protTarget = v;
      else if (k === K.medTarget) settings.medTarget = v;
      else if (k === K.darkMode) settings.darkMode = v;
      await sb.from("profiles").upsert({ id: CURRENT_UID, settings: settings });
    } catch(e) { console.error("Save setting", e); }
    return;
  }
  // Custom types stay in localStorage
  if (k === K.cex || k === K.cact) { try { localStorage.setItem("pd_" + k, JSON.stringify(v)); } catch(e) {} return; }
  // Array data: full replace via Supabase (used by bulk operations like setMeds)
  if (TBL[k] && Array.isArray(v)) {
    // For meds, do a full replace: delete all then insert
    if (k === K.meds) {
      await sb.from(TBL[k]).delete().eq("user_id", CURRENT_UID);
      for (var i = 0; i < v.length; i++) { await dbSave(k, v[i]); }
    }
    // For other arrays we upsert each item
    else { for (var i = 0; i < v.length; i++) { await dbSave(k, v[i]); } }
    return;
  }
}

function dAgo(n) { var d = new Date(); d.setDate(d.getDate() - n); return d.toISOString().slice(0, 10); }
function dateOf(iso) { return iso ? iso.slice(0, 10) : td(); }

// Simple markdown-ish renderer for AI reports
function RenderMD(p) {
  var lines = (p.text || "").split("\n");
  return (<div className="space-y-1">{lines.map(function(line, i) {
    var trimmed = line.trim();
    if (!trimmed) return <div key={i} className="h-2" />;
    if (trimmed.match(/^###\s/)) return <h4 key={i} className="font-bold text-sm text-gray-800 mt-3">{trimmed.replace(/^###\s*/, "")}</h4>;
    if (trimmed.match(/^##\s/)) return <h3 key={i} className="font-bold text-base text-gray-900 mt-4">{trimmed.replace(/^##\s*/, "")}</h3>;
    if (trimmed.match(/^#\s/)) return <h2 key={i} className="font-bold text-lg text-gray-900 mt-4 mb-1">{trimmed.replace(/^#\s*/, "")}</h2>;
    if (trimmed.match(/^[-*]\s/)) return <div key={i} className="text-sm text-gray-700 pl-3 flex"><span className="mr-2">•</span><span>{renderBold(trimmed.replace(/^[-*]\s*/, ""))}</span></div>;
    if (trimmed.match(/^\d+\.\s/)) return <div key={i} className="text-sm text-gray-700 pl-3">{renderBold(trimmed)}</div>;
    return <p key={i} className="text-sm text-gray-700">{renderBold(trimmed)}</p>;
  })}</div>);
}

function renderBold(text) {
  var parts = text.split(/\*\*(.*?)\*\*/g);
  return parts.map(function(part, i) { return i % 2 === 1 ? <strong key={i}>{part}</strong> : part; });
}

function calcFastHrs(start, end) {
  var sp = start.split(":"), ep = end.split(":");
  var sm = parseInt(sp[0]) * 60 + parseInt(sp[1]);
  var em = parseInt(ep[0]) * 60 + parseInt(ep[1]);
  var diff = em - sm;
  if (diff <= 0) diff += 1440; // overnight
  return Math.round(diff / 6) / 10; // 1 decimal
}

    // Listen for auth changes
    var { data: { subscription } } = sb.auth.onAuthStateChange(function(event, s) {
      if (s) { CURRENT_UID = s.user.id; ANTHROPIC_API_KEY = localStorage.getItem("pd_api_key") || ""; }
      else { CURRENT_UID = null; }
      setSession(s);
    });
    return function() { subscription.unsubscribe(); };
  }, []);

  if (checking) return (<div className="max-w-md mx-auto min-h-screen bg-gray-50 flex items-center justify-center" style={{ fontFamily: "system-ui, sans-serif" }}><div className="text-center"><div className="animate-spin w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full mx-auto mb-3" /><p className="text-gray-500">Loading...</p></div></div>);

  if (!session) return <AuthScreen />;

  return <App />;
}

ReactDOM.render(<AuthGate />, document.getElementById("root"));
</script></body></html>
